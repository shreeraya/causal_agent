<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supply Chain Causal Agent</title>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<style>
  :root {
    --bg: #0f1419; --panel: #1a2027; --panel2: #222a33; --border: #2d3742;
    --text: #e6edf3; --muted: #8b98a5; --accent: #4da3ff; --accent2: #2ecc8f;
    --user-bubble: #1f4068; --mono: "Cascadia Code", Consolas, monospace;
  }
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--bg); color: var(--text); font: 15px/1.55 "Segoe UI", system-ui, sans-serif;
         height: 100vh; display: flex; flex-direction: column; }
  header { padding: 14px 24px; border-bottom: 1px solid var(--border); background: var(--panel);
           display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 17px; font-weight: 600; }
  header .status { margin-left: auto; font-size: 12px; color: var(--muted); }
  header .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; }
  #chat { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
  .msg { max-width: 820px; }
  .msg.user { align-self: flex-end; background: var(--user-bubble); padding: 10px 16px;
              border-radius: 14px 14px 4px 14px; white-space: pre-wrap; }
  .msg.bot { align-self: flex-start; background: var(--panel); border: 1px solid var(--border);
             padding: 14px 18px; border-radius: 14px 14px 14px 4px; }
  .msg.bot .md h1, .msg.bot .md h2, .msg.bot .md h3 { font-size: 1.05em; margin: 10px 0 4px; }
  .msg.bot .md p { margin: 6px 0; }
  .msg.bot .md ul, .msg.bot .md ol { margin: 6px 0 6px 22px; }
  .msg.bot .md table { border-collapse: collapse; margin: 8px 0; font-size: 13.5px; }
  .msg.bot .md th, .msg.bot .md td { border: 1px solid var(--border); padding: 4px 10px; }
  .msg.bot .md th { background: var(--panel2); }
  .msg.bot .md code { background: var(--panel2); padding: 1px 5px; border-radius: 4px;
                      font-family: var(--mono); font-size: 12.5px; }
  .msg.bot .md pre { background: var(--panel2); padding: 10px; border-radius: 8px;
                     overflow-x: auto; margin: 8px 0; }
  .msg.bot .md pre code { background: none; padding: 0; }
  details.trace { margin-top: 10px; font-size: 12.5px; color: var(--muted); }
  details.trace summary { cursor: pointer; user-select: none; }
  details.trace .q { background: var(--panel2); border: 1px solid var(--border); border-radius: 8px;
                     padding: 8px 10px; margin: 6px 0; }
  details.trace pre { font-family: var(--mono); font-size: 11.5px; white-space: pre-wrap;
                      word-break: break-word; color: #a8c7e8; }
  details.trace .meta { margin-top: 4px; }
  details.trace .err { color: #ff7b72; }
  .thinking { align-self: flex-start; color: var(--muted); font-size: 13.5px; padding: 6px 2px;
              display: flex; align-items: center; gap: 8px; }
  .spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent);
             border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #suggestions { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 24px 10px; }
  #suggestions button { background: var(--panel); border: 1px solid var(--border); color: var(--text);
                        border-radius: 16px; padding: 6px 14px; font-size: 13px; cursor: pointer; }
  #suggestions button:hover { border-color: var(--accent); }
  #inputbar { display: flex; gap: 10px; padding: 14px 24px 20px; border-top: 1px solid var(--border);
              background: var(--panel); }
  #inputbar textarea { flex: 1; resize: none; background: var(--panel2); border: 1px solid var(--border);
                       border-radius: 10px; color: var(--text); padding: 10px 14px; font: inherit;
                       max-height: 140px; }
  #inputbar textarea:focus { outline: none; border-color: var(--accent); }
  #send { background: var(--accent); color: #08121f; border: none; border-radius: 10px;
          padding: 0 22px; font-weight: 600; cursor: pointer; }
  #send:disabled { opacity: .45; cursor: default; }
</style>
</head>
<body>
<header>
  <h1>&#128230; Supply Chain Causal Agent</h1>
  <span class="status" id="status"><span class="dot" style="background:#666"></span>checking…</span>
</header>

<div id="chat">
  <div class="msg bot"><div class="md">
    <p>Hi! I answer <b>factual</b> and <b>causal</b> questions about a multi-echelon supply chain
    (8 suppliers &rarr; 3 plants &rarr; 8 DCs &rarr; 20 stores, 120 SKUs, 52 weeks of history).
    Ask me anything, or try a suggestion below.</p>
  </div></div>
</div>

<div id="suggestions">
  <button>Which SKUs are most exposed to the sugar shortage?</button>
  <button>What is the shortest lead-time route from GlobalSweet Ltd to the Boston store?</button>
  <button>Did the sugar shortage actually cause stockouts in stores? How big was the effect?</button>
  <button>What is the causal effect of promotions on units sold?</button>
  <button>Why did western stores receive less inventory in late June 2026?</button>
</div>

<div id="inputbar">
  <textarea id="input" rows="1" placeholder="Ask a factual or causal question…"></textarea>
  <button id="send">Send</button>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const sendBtn = document.getElementById("send");
const history = [];   // {role, content}

fetch("/api/health").then(r => r.json()).then(h => {
  const s = document.getElementById("status");
  const ok = h.neo4j && h.api_key;
  const missing = [!h.neo4j && "Neo4j down", !h.api_key && "no API key"].filter(Boolean).join(", ");
  s.innerHTML = `<span class="dot" style="background:${ok ? "#2ecc8f" : "#e0a030"}"></span>` +
                (ok ? "Neo4j + API connected" : missing);
});

function addUser(text) {
  const div = document.createElement("div");
  div.className = "msg user";
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addBot(markdown, trace) {
  const div = document.createElement("div");
  div.className = "msg bot";
  const md = document.createElement("div");
  md.className = "md";
  md.innerHTML = DOMPurify.sanitize(marked.parse(markdown));
  div.appendChild(md);
  if (trace && trace.length) {
    const det = document.createElement("details");
    det.className = "trace";
    det.innerHTML = `<summary>&#128269; ${trace.length} graph ${trace.length === 1 ? "query" : "queries"} executed</summary>` +
      trace.map(t => `<div class="q"><pre>${escapeHtml(t.query.trim())}</pre>` +
        `<div class="meta">${t.error ? `<span class="err">${escapeHtml(t.error)}</span>`
                                      : `${t.row_count} row${t.row_count === 1 ? "" : "s"}`}</div></div>`).join("");
    div.appendChild(det);
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

async function send(text) {
  text = text.trim();
  if (!text || sendBtn.disabled) return;
  addUser(text);
  history.push({ role: "user", content: text });
  input.value = "";
  sendBtn.disabled = true;

  const thinking = document.createElement("div");
  thinking.className = "thinking";
  thinking.innerHTML = `<div class="spinner"></div> querying the graph…`;
  chat.appendChild(thinking);
  chat.scrollTop = chat.scrollHeight;

  try {
    const resp = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: history }),
    });
    const data = await resp.json();
    thinking.remove();
    addBot(data.reply, data.trace);
    history.push({ role: "assistant", content: data.reply });
  } catch (e) {
    thinking.remove();
    addBot("**Request failed:** " + e.message, []);
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
}

sendBtn.onclick = () => send(input.value);
input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(input.value); }
});
document.querySelectorAll("#suggestions button").forEach(b => b.onclick = () => send(b.textContent));
input.focus();
</script>
</body>
</html>
